defaults:
  - /slam: default

instance: vipe.pipeline.default.DefaultAnnotationPipeline

# Init configs
init:
  camera_type: "pinhole"
  intrinsics: "geocalib"
  instance:
    kf_gap_sec: 2.0
    phrases: 
      - person
      - animal
      - vehicle
      - ball
      - balloon
      - gun
      - pet
      - car
      - bus
    add_sky: true

slam:
  keyframe_depth: unidepth-l
  optimize_intrinsics: ${neq:${..init.intrinsics},"gt"}

# Post-processing configs
post:
  depth_align_model: "adaptive_unidepth-l_svda"

# Output configs
output:
  # Path to save results
  path: vipe_results/
  skip_exists: false

  # Save artifacts and a info file
  save_artifacts: false

  # Save reconstruction from SLAM
  save_slam_map: false

  # Save point cloud using open3d scalable TSDF volume integration
  save_tsdf_ply: false
  
  # TSDF specific configurations (only used if save_tsdf_ply is true)
  tsdf_voxel_length: 0.01
  tsdf_sdf_trunc: 0.04
  
  # Dynamic Object Masking (zeroes out depth on moving objects like people, cars)
  tsdf_apply_dynamic_mask: true
  
  # Depth Edge Pruning (drops depth discontinuity pixels to avoid flying pixels/comet tails)
  tsdf_apply_edge_pruning: true
  # Relative mode thresholds operate on |grad(depth)| / max(depth, eps)
  tsdf_edge_pruning_relative: true
  tsdf_edge_pruning_threshold: 0.1

  # Depth truncation for TSDF integration:
  # if auto mode is enabled, use Tukey fence (Q3 + scale * IQR) per frame
  tsdf_depth_trunc: 10.0
  tsdf_auto_depth_trunc: true
  tsdf_auto_depth_trunc_iqr_scale: 1.5
  tsdf_auto_depth_trunc_min: 2.0
  tsdf_auto_depth_trunc_max: 40.0
  
  # Statistical Outlier Removal (cleans up floating noise in the final point cloud)
  tsdf_apply_sor: true
  tsdf_sor_nb_neighbors: 50
  tsdf_sor_std_ratio: 2.0

  # Visualization videos to BASE_PATH/vipe/xxx.mp4
  save_viz: true
  viz_downsample: 2
  viz_attributes: [['rgb', 'instance'], ['depth', 'pcd']]
